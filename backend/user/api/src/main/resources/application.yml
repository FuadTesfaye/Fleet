spring:
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/fms_user
    username: ${DB_USER:fms}
    password: ${DB_PASS:fms}
  jpa:
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      group-id: fms-user-group
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_URL:http://localhost:8180}/realms/fms
server:
  port: ${PORT:8082}
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
